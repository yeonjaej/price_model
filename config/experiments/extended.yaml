# Extended experiment: baseline + sector-relative + idiosyncratic vol + ranks.
# Same harness as baseline.yaml; richer feature set so LightGBM has more to bite on.

experiment_id: extended_v1

data:
  universe: sp500
  start: 2017-01-01

features:
  - return_5d
  - momentum_60
  - vol_20
  - rsi_14
  - distance_ma_200
  - momentum_60_sector_rel
  - idio_vol_20
  - momentum_60_rank
  - vol_20_rank
  - distance_ma_200_rank

normalize_kind: zscore
target_horizon: 5

walk_forward:
  refit_freq_days: 21
  embargo_days: 6
  min_train_days: 504

models:
  - id: zero_v1
    class: ZeroPredictor
    params: {}

  - id: last_return_v1
    class: LastReturnPredictor
    params: {}

  - id: lightgbm_extended_v1
    class: LightGBMModel
    params:
      learning_rate: 0.05
      num_leaves: 31
      min_data_in_leaf: 200
      n_estimators: 400
