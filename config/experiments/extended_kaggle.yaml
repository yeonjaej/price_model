# Extended feature set + Kaggle-hedge-fund-converged hyperparameters + 5-seed averaging.
#
# What's different from extended.yaml:
#   - num_leaves: 31    -> 128
#   - learning_rate: 0.05 -> 0.02
#   - n_estimators: 400 -> 2000  (paired with early stopping)
#   - lambda_l1: -      -> 0.1
#   - lambda_l2: -      -> 5.0   (the "shock absorber")
#   - feature_fraction: 0.9 -> 0.7
#   - bagging_fraction: 0.9 -> 0.7
#   - early_stopping_rounds: -  -> 100  (with internal 10% val-by-date split)
#   - seeds: [42]       -> [42, 2024, 12345, 99, 420]  (multi-seed averaging)
#
# Direct A/B vs extended.yaml — same features, same harness, only the booster changes.

experiment_id: extended_kaggle_v1

data:
  universe: sp500
  start: 2017-01-01

features:
  - return_5d
  - momentum_60
  - vol_20
  - rsi_14
  - distance_ma_200
  - momentum_60_sector_rel
  - idio_vol_20
  - momentum_60_rank
  - vol_20_rank
  - distance_ma_200_rank

normalize_kind: zscore
target_horizon: 5

walk_forward:
  refit_freq_days: 21
  embargo_days: 6
  min_train_days: 504        # ~2y

models:
  # Baselines for direct comparison in the same store / report
  - id: zero_v1
    class: ZeroPredictor
    params: {}

  - id: last_return_v1
    class: LastReturnPredictor
    params: {}

  # The Kaggle-style LightGBM
  - id: lightgbm_kaggle_v1
    class: LightGBMModel
    params:
      # Core boosting params
      learning_rate: 0.02
      num_leaves: 128
      min_data_in_leaf: 200
      feature_fraction: 0.7
      bagging_fraction: 0.7
      bagging_freq: 5
      lambda_l1: 0.1
      lambda_l2: 5.0
      n_estimators: 2000

      # Internal validation + early stopping (our wrapper's knobs)
      val_fraction: 0.1               # last 10% of training DATES held out per refit
      early_stopping_rounds: 100

      # Multi-seed ensemble — 5 seeds, predictions averaged
      seeds: [42, 2024, 12345, 99, 420]
