name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type check
        run: pyright src

      - name: Tests (including no-leakage)
        run: pytest -q
